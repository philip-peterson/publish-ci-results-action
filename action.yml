name: "Publish Test Results"
description: "Publish test results (JUnit, NUnit, TRX) to GitHub Check Runs and PR comments"
author: "EnricoMi"

inputs:
  github_token:
    description: "GitHub token"
    default: ${{ github.token }}
  files:
    description: "Glob patterns for test result files (newline or space separated)"
  report_paths:
    description: "Deprecated alias for 'files'"
  check_name:
    description: "Name of the check run"
    default: "Test Results"
  fail_on:
    description: "When to set conclusion to failure: nothing | errors | test failures"
    default: "test failures"
  fail_on_failure:
    description: "Deprecated alias for fail_on: true maps to 'test failures', false maps to 'nothing'"
  comment_mode:
    description: "PR comment behavior: always | changes | off"
    default: "always"
  annotate_only:
    description: "Deprecated: ignored"
  include_passed:
    description: "Deprecated: ignored"
  detailed_summary:
    description: "Deprecated: ignored"
  check_run:
    description: "Create a check run"
    default: "true"
  job_summary:
    description: "Write a job summary"
    default: "true"
  time_unit:
    description: "Time unit reported in XML: seconds | milliseconds"
    default: "seconds"

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
    INPUT_FILES: ${{ inputs.files }}
    INPUT_REPORT_PATHS: ${{ inputs.report_paths }}
    INPUT_CHECK_NAME: ${{ inputs.check_name }}
    INPUT_FAIL_ON: ${{ inputs.fail_on }}
    INPUT_FAIL_ON_FAILURE: ${{ inputs.fail_on_failure }}
    INPUT_COMMENT_MODE: ${{ inputs.comment_mode }}
    INPUT_CHECK_RUN: ${{ inputs.check_run }}
    INPUT_JOB_SUMMARY: ${{ inputs.job_summary }}
    INPUT_TIME_UNIT: ${{ inputs.time_unit }}
